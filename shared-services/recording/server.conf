[logs]
level = 30

[http]
listen = 0.0.0.0:1234

[backend]
allowall = false
secret = RECORDING_SECRET_PLACEHOLDER
backends = backend1
skipverify = false
maxmessagesize = 1024
videowidth = 1920
videoheight = 1080
directory = /tmp

# Backend default (substituído dinamicamente pelo manage.sh durante a criação
# de cada cliente). O nome SEM hífen evita o bug "KeyError: ''" do ConfigParser
# observado em versões anteriores quando o ID continha caractere hífen ou ficava
# vazio antes da regravação.
[backend1]
url = https://CUSTOMER_DOMAIN_PLACEHOLDER
secret = RECORDING_SECRET_PLACEHOLDER
skipverify = false

[signaling]
# Duas seções:
#  - signaling1: URL interna (rede docker shared) para WebSocket entre o bot e o
#                Signaling HPB. Mais rápido e fora do alcance público.
#  - signaling2: URL pública (HTTPS) — necessária porque o Nextcloud envia ao
#                bot a URL externa configurada em `talk:signaling:list`. Sem
#                essa seção o bot trava com:
#                "No configured signaling secret for https://signaling-01..."
signalings = signaling1, signaling2

[signaling1]
url = ws://shared-signaling:8080
internalsecret = SIGNALING_INTERNAL_SECRET_PLACEHOLDER

[signaling2]
url = https://SIGNALING_DOMAIN_PLACEHOLDER
internalsecret = SIGNALING_INTERNAL_SECRET_PLACEHOLDER

[ffmpeg]
extensionaudio = .ogg
extensionvideo = .webm

[recording]
browser = firefox
driverPath = /usr/bin/geckodriver
browserPath = /usr/bin/firefox
