[logs]
level = 30

[http]
listen = 0.0.0.0:1234

[backend]
allowall = false
secret = RECORDING_SECRET_PLACEHOLDER
backends = backend1
skipverify = false
maxmessagesize = 1024
videowidth = 1920
videoheight = 1080
directory = /tmp

# Backend default (substituído dinamicamente pelo manage.sh durante a criação
# de cada cliente). O nome SEM hífen evita o bug "KeyError: ''" do ConfigParser
# observado em versões anteriores quando o ID continha caractere hífen ou ficava
# vazio antes da regravação.
[backend1]
url = https://CUSTOMER_DOMAIN_PLACEHOLDER
secret = RECORDING_SECRET_PLACEHOLDER
skipverify = false

[signaling]
signalings = signaling1

[signaling1]
url = ws://shared-signaling:8080
internalsecret = SIGNALING_INTERNAL_SECRET_PLACEHOLDER

[ffmpeg]
extensionaudio = .ogg
extensionvideo = .webm

[recording]
browser = firefox
driverPath = /usr/bin/geckodriver
browserPath = /usr/bin/firefox
